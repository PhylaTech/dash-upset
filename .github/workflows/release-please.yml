name: release-please

on:
  push:
    branches: [main]
  # Manual re-publish escape hatch: re-run publishing for an already-released
  # tag without cutting a new release (e.g. after fixing PyPI trusted-publisher
  # config). release-please only fires publish when it *creates* a release, so
  # a failed first upload can't otherwise be retried by re-running the release.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build and publish (e.g. v0.1.0). Defaults to the branch this runs on."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Publish must live in the SAME workflow as the release. A GitHub Release
  # created by release-please uses the default GITHUB_TOKEN, and events raised
  # by GITHUB_TOKEN do not trigger other workflows (GitHub's recursion guard),
  # so a standalone `on: release` workflow would never fire. Gate a publish job
  # on release-please's release_created output -- or on a manual dispatch.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # trusted publishing (no API token needed)
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Configure trusted publishing at:
        # https://pypi.org/manage/account/publishing/  (pending publisher)
        # Workflow name field: release-please.yml   (no environment configured)
