<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examples &mdash; dash-upset</title>
    <meta name="description" content="Curated UpSet-plot examples for dash-upset: movie genres, survey multi-select, differentially expressed genes, variant-caller concordance, model error sets, and feature co-occurrence.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/site.css?v=5">
</head>
<body data-page="examples">

<div id="site-nav-mount"></div>

<header class="hero">
    <h1>Examples</h1>
    <p>Set-intersection problems from genomics, data science, and general analytics. Each ships with a Python <code>dash-upset</code> snippet and an interactive plot.</p>
</header>

<section>
    <div class="container">
        <div class="gallery-filter" role="toolbar" aria-label="Filter examples">
            <div class="filter-group" id="filter-category" role="radiogroup" aria-label="Category">
                <button type="button" data-cat="all" class="active">All</button>
                <button type="button" data-cat="bioinformatics">Bioinformatics</button>
                <button type="button" data-cat="data-science">Data science</button>
                <button type="button" data-cat="general">General</button>
            </div>
            <div class="filter-group" id="filter-sort" role="radiogroup" aria-label="Sort">
                <button type="button" data-sort="featured" class="active">Featured</button>
                <button type="button" data-sort="complexity-asc">Simplest first</button>
                <button type="button" data-sort="complexity-desc">Most complex</button>
            </div>
            <input id="filter-search" class="filter-search" type="text" placeholder="Search examples..." aria-label="Search examples">
        </div>

        <div id="gallery-grid" class="gallery-grid"></div>
        <div id="gallery-empty" class="gallery-empty" style="display: none;">
            No examples match the current filters.
        </div>
    </div>
</section>

<footer>
    <p>
        Made with &#x2764;&#xFE0F; by <a href="https://github.com/PhylaTech" target="_blank" rel="noopener">PhylaTech</a>
        &middot; Powered by <a href="https://plotly.com/python/" target="_blank" rel="noopener">Plotly</a>
        &middot; <a href="https://github.com/PhylaTech/dash-upset" target="_blank" rel="noopener">Source on GitHub</a>
    </p>
</footer>

<script src="./assets/nav.js?v=6"></script>
<script src="./data/examples.js?v=1"></script>
<script>
    (function () {
        var CATEGORY_LABEL = {
            bioinformatics: "bioinformatics",
            "data-science": "data science",
            general: "general",
        };
        var CATEGORY_BADGE = {
            bioinformatics: "badge-academic",
            "data-science": "badge-industrial",
            general: "badge-tag",
        };

        var state = { category: "all", sort: "featured", search: "" };
        var params = new URLSearchParams(window.location.search);
        if (params.get("category")) state.category = params.get("category");
        if (params.get("search")) state.search = params.get("search");

        var grid = document.getElementById("gallery-grid");
        var empty = document.getElementById("gallery-empty");
        var searchInput = document.getElementById("filter-search");
        searchInput.value = state.search;

        function syncActive() {
            document.querySelectorAll("#filter-category button").forEach(function (b) {
                b.classList.toggle("active", b.dataset.cat === state.category);
            });
            document.querySelectorAll("#filter-sort button").forEach(function (b) {
                b.classList.toggle("active", b.dataset.sort === state.sort);
            });
        }

        function matches(ex) {
            if (state.category !== "all" && ex.category !== state.category) return false;
            if (state.search) {
                var q = state.search.trim().toLowerCase();
                var hay = [ex.title, ex.summary, (ex.tags || []).join(" ")].join(" ").toLowerCase();
                if (hay.indexOf(q) === -1) return false;
            }
            return true;
        }

        function sortList(list) {
            var copy = list.slice();
            if (state.sort === "complexity-asc") {
                copy.sort(function (a, b) { return (a.complexity || 0) - (b.complexity || 0); });
            } else if (state.sort === "complexity-desc") {
                copy.sort(function (a, b) { return (b.complexity || 0) - (a.complexity || 0); });
            } else {
                copy.sort(function (a, b) {
                    var af = a.featured ? 0 : 1, bf = b.featured ? 0 : 1;
                    if (af !== bf) return af - bf;
                    return (a.complexity || 0) - (b.complexity || 0);
                });
            }
            return copy;
        }

        function render() {
            var all = window.DASH_UPSET_DATASETS || [];
            var filtered = sortList(all.filter(matches));
            grid.innerHTML = "";
            empty.style.display = filtered.length === 0 ? "block" : "none";

            filtered.forEach(function (ex) {
                var a = document.createElement("a");
                a.className = "gallery-card";
                a.href = "./example.html?id=" + encodeURIComponent(ex.id);

                var badges = document.createElement("div");
                badges.className = "card-badges";

                var catBadge = document.createElement("span");
                catBadge.className = "badge " + (CATEGORY_BADGE[ex.category] || "badge-tag");
                catBadge.textContent = CATEGORY_LABEL[ex.category] || ex.category;
                badges.appendChild(catBadge);

                var cxBadge = document.createElement("span");
                cxBadge.className = "badge badge-complexity";
                cxBadge.textContent = "complexity " + (ex.complexity || "?");
                badges.appendChild(cxBadge);

                (ex.tags || []).slice(0, 2).forEach(function (t) {
                    var b = document.createElement("span");
                    b.className = "badge badge-tag";
                    b.textContent = t;
                    badges.appendChild(b);
                });
                a.appendChild(badges);

                var h = document.createElement("h3");
                h.textContent = ex.title;
                a.appendChild(h);

                var p = document.createElement("p");
                p.textContent = ex.summary;
                a.appendChild(p);

                var meta = document.createElement("div");
                meta.className = "card-meta";
                meta.textContent = ex.nSets + " sets · " + ex.nIntersections + " intersections";
                a.appendChild(meta);

                grid.appendChild(a);
            });
            syncActive();
        }

        document.querySelectorAll("#filter-category button").forEach(function (b) {
            b.addEventListener("click", function () { state.category = b.dataset.cat; render(); });
        });
        document.querySelectorAll("#filter-sort button").forEach(function (b) {
            b.addEventListener("click", function () { state.sort = b.dataset.sort; render(); });
        });
        searchInput.addEventListener("input", function (e) { state.search = e.target.value || ""; render(); });

        render();
    })();
</script>

</body>
</html>
