name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Publish must live in the SAME workflow as the release. A GitHub Release
  # created by release-please uses the default GITHUB_TOKEN, and events raised
  # by GITHUB_TOKEN do not trigger other workflows (GitHub's recursion guard),
  # so a standalone `on: release` workflow would never fire. Gate a publish job
  # on release-please's release_created output instead.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # trusted publishing (no API token needed)
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Configure trusted publishing at:
        # https://pypi.org/manage/project/dash-upset/settings/publishing/
        # Workflow name field: release-please.yml   (no environment configured)
