name: Docs preview

# Deploy each pull request's static docs/ site to a GitHub Pages preview under
# pr-preview/pr-<number>/ on the gh-pages branch, and comment the URL on the PR.
# Removes the preview when the PR closes. No external accounts or secrets: it
# reuses GitHub Pages (which serves gh-pages), where production docs also live.
# Preview URL: https://phylatech.github.io/dash-upset/pr-preview/pr-<number>/

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # Fork PRs get a read-only token that cannot push to gh-pages, so only run
    # for branches that live in this repository.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: docs
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
