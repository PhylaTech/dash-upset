name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Run tests
        run: pixi run test
